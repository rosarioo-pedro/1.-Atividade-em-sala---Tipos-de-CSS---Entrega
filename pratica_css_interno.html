<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Aula CSS - 1</title>
</head>
<style>
	.card {

		width: 500px;
		height: fit-content;
		background-color: aliceblue;
		border-radius: 20px;
		border: solid 3px navy;
		margin: 20px;
		padding: 40px;
	}

	.border {
		border-radius: 20px;
	}

	.icone1 {
		width: 100px;
		height: 100px;
		background-image: url('https://cdn-icons-png.flaticon.com/512/706/706830.png');
		background-size: cover;
	}

	.icone2 {
		width: 100px;
		height: 100px;
		border-radius: 25px;
		background-image: url('https://cdn-icons-png.flaticon.com/256/3681/3681928.png');
		background-size: cover;
	}

	.text {
		font-family: Arial, Helvetica, sans-serif;
	}

	.title {
		font-size: 30px;
	}

	.maincolor {
		color: navy;
	}

	p {
		font-size: 15px;
	}

	.italic {
		font-style: italic;
	}
</style>

<body>

	<div class="card border">
		<div class="icone1 border">

		</div>

		<div>
			<h1 class="text title">
				Meu nome é: <span class="maincolor">Adriana</span>
			</h1>

			<p class="text">
				Mensagem: <span class="maincolor italic"">A vida não é um morango! E tá tudo bem!</span>
			</p>
		</div>
	</div>

	<div class=" card border">

					<div class="icone2 border">

					</div>

					<div>
						<h1 class="text title">
							Meu nome é: <span class="maincolor">Hugo</span>
						</h1>

						<p class="text">
							Mensagem: <span class="maincolor italic">Um dia é da caça, o outro é docaçador.</span>
						</p>
					</div>
		</div>

</body>

</html>
